<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0B3C5D"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
  </defs>
  <!-- Outer steel ring -->
  <circle cx="100" cy="100" r="95" stroke="url(#steelGrad)" stroke-width="4" fill="none"/>
  <circle cx="100" cy="100" r="88" stroke="#0B3C5D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Gear teeth -->
  <g fill="#0B3C5D" opacity="0.15">
    <rect x="96" y="2" width="8" height="12" rx="2"/>
    <rect x="96" y="186" width="8" height="12" rx="2"/>
    <rect x="2" y="96" width="12" height="8" rx="2"/>
    <rect x="186" y="96" width="12" height="8" rx="2"/>
    <rect x="28" y="28" width="10" height="8" rx="2" transform="rotate(-45 33 32)"/>
    <rect x="162" y="28" width="10" height="8" rx="2" transform="rotate(45 167 32)"/>
    <rect x="28" y="164" width="10" height="8" rx="2" transform="rotate(45 33 168)"/>
    <rect x="162" y="164" width="10" height="8" rx="2" transform="rotate(-45 167 168)"/>
  </g>
  <!-- Grinding wheel -->
  <circle cx="100" cy="100" r="55" stroke="url(#steelGrad)" stroke-width="6" fill="#F8FAFC"/>
  <circle cx="100" cy="100" r="48" stroke="#6B7280" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Inner grinding texture -->
  <g opacity="0.2">
    <line x1="100" y1="52" x2="100" y2="148" stroke="#0B3C5D" stroke-width="0.5"/>
    <line x1="52" y1="100" x2="148" y2="100" stroke="#0B3C5D" stroke-width="0.5"/>
    <line x1="66" y1="66" x2="134" y2="134" stroke="#0B3C5D" stroke-width="0.5"/>
    <line x1="134" y1="66" x2="66" y2="134" stroke="#0B3C5D" stroke-width="0.5"/>
  </g>
  <!-- Letter H -->
  <path d="M78 68 L78 132 L88 132 L88 102 L112 102 L112 132 L122 132 L122 68 L112 68 L112 92 L88 92 L88 68 Z" fill="url(#steelGrad)"/>
  <!-- CNC tool accent -->
  <rect x="130" y="55" width="4" height="30" rx="1" fill="url(#accentGrad)" transform="rotate(30 132 70)"/>
  <polygon points="132,48 136,55 128,55" fill="url(#accentGrad)" transform="rotate(30 132 52)"/>
  <!-- Spark accents -->
  <circle cx="145" cy="60" r="2" fill="#FF8C00" opacity="0.8"/>
  <circle cx="150" cy="55" r="1.5" fill="#FF8C00" opacity="0.6"/>
  <circle cx="55" cy="145" r="2" fill="#FF8C00" opacity="0.8"/>
</svg>
